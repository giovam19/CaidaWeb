<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>Lobby</title>

        <link rel="stylesheet" href="/css/lobby.css" />
    </head>

    <body class="home">
        <div class="hor-cont" style="height: auto; width: auto">
            <h1 class="lobby-title">Lobby</h1>
        </div>
        <div class="ver-cont home">
            <div class="ver-cont user-info">
                <p class="username-info" id="username"></p>
                <div class="hor-cont win-exit-space">
                    <p class="wins-info" id="wins-info">Ganadas: 0</p>
                    <button class="exit-button" id="logout" type="submit">
                        Cerrar
                    </button>
                </div>
            </div>
            <div class="hor-cont" id="rooms">
                <div class="room" id="room1">
                    <img
                        src="/res/img/serie/settings-icon.png"
                        alt="settings"
                        class="settings-icon"
                    />
                    <h2 class="room-title">Mesa 1</h2>
                    <button
                        class="exit-room-b"
                        style="display: none"
                        id="exitB1"
                        data-action="leave"
                    >
                        Salir
                    </button>
                    <div class="hor-cont">
                        <div class="team-cont">
                            <h3 class="room-team-name">Equipo 1</h3>
                            <button
                                class="noplayer"
                                data-action="join"
                                data-table="1"
                                data-team="1"
                                data-pos="1"
                                id="r1t1p1"
                            >
                                Ingresar
                            </button>
                            <button
                                class="noplayer"
                                data-action="join"
                                data-table="1"
                                data-team="1"
                                data-pos="2"
                                id="r1t1p2"
                            >
                                Ingresar
                            </button>
                        </div>
                        <div class="team-cont">
                            <h3 class="room-team-name">Equipo 2</h3>
                            <button
                                class="noplayer"
                                data-action="join"
                                data-table="1"
                                data-team="2"
                                data-pos="3"
                                id="r1t2p3"
                            >
                                Ingresar
                            </button>
                            <button
                                class="noplayer"
                                data-action="join"
                                data-table="1"
                                data-team="2"
                                data-pos="4"
                                id="r1t2p4"
                            >
                                Ingresar
                            </button>
                        </div>
                    </div>
                </div>
                <div class="room" id="room2">
                    <img
                        src="/res/img/serie/settings-icon.png"
                        alt="settings"
                        class="settings-icon"
                    />
                    <h2 class="room-title">Mesa 2</h2>
                    <button
                        class="exit-room-b"
                        style="display: none"
                        id="exitB2"
                        data-action="leave"
                    >
                        Salir
                    </button>
                    <div class="hor-cont">
                        <div class="team-cont">
                            <h3 class="room-team-name">Equipo 1</h3>
                            <button
                                class="noplayer"
                                data-action="join"
                                data-table="2"
                                data-team="1"
                                data-pos="1"
                                id="r2t1p1"
                            >
                                Ingresar
                            </button>
                            <button
                                class="noplayer"
                                data-action="join"
                                data-table="2"
                                data-team="1"
                                data-pos="2"
                                id="r2t1p2"
                            >
                                Ingresar
                            </button>
                        </div>
                        <div class="team-cont">
                            <h3 class="room-team-name">Equipo 2</h3>
                            <button
                                class="noplayer"
                                data-action="join"
                                data-table="2"
                                data-team="2"
                                data-pos="3"
                                id="r2t2p3"
                            >
                                Ingresar
                            </button>
                            <button
                                class="noplayer"
                                data-action="join"
                                data-table="2"
                                data-team="2"
                                data-pos="4"
                                id="r2t2p4"
                            >
                                Ingresar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script type="module" src="/js/lobby.js"></script>
    </body>
</html>
